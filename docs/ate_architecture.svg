<text x="830" y="703" font-size="10" fill="#94a3b8">Control lines (coils)</text>
<line x1="920" y1="700" x2="950" y2="700" class="line-stimulus"/>
<text x="960" y="703" font-size="10" fill="#94a3b8">Drive / Stimulus</text>
